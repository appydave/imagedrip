<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Probe A — read path</title>
    <style>
      body { font: 14px system-ui; padding: 20px; }
      #chat > div { border: 1px solid #ccc; margin: 8px 0; padding: 8px; }
      img { max-width: 128px; display: block; }
    </style>
  </head>
  <body>
    <h1>Probe A — read path (MutationObserver → main)</h1>
    <p>
      Emits a ChatGPT-shaped assistant turn with a real <code>blob:</code> image so the
      <em>real</em> webview preload's <code>findFinishedImage</code> + <code>isLoaded</code> fire.
      Watch the terminal for an <code>image-done</code> message.
    </p>
    <button id="go">emit assistant turn + image</button>
    <div id="chat"></div>

    <script>
      // Build a real (decoded) image via a blob: URL — passes isLoaded's
      // "https/blob + naturalWidth>32" gate, exactly like a finished ChatGPT image.
      function makeBlobImage() {
        return new Promise((resolve) => {
          const c = document.createElement('canvas');
          c.width = 64;
          c.height = 64;
          const ctx = c.getContext('2d');
          ctx.fillStyle = '#4f46e5';
          ctx.fillRect(0, 0, 64, 64);
          c.toBlob((blob) => resolve(URL.createObjectURL(blob)), 'image/png');
        });
      }

      async function emit() {
        // ChatGPT-shaped: an assistant turn containing the finished <img>.
        const turn = document.createElement('div');
        turn.setAttribute('data-message-author-role', 'assistant');
        turn.textContent = 'Here is your image:';
        document.getElementById('chat').appendChild(turn);

        // Append the image a beat later, mimicking generation settling.
        const url = await makeBlobImage();
        const img = new Image();
        img.src = url;
        img.onload = () => turn.appendChild(img);
      }

      document.getElementById('go').addEventListener('click', emit);
      // Auto-fire once so the probe works unattended.
      setTimeout(emit, 1500);
    </script>
  </body>
</html>
